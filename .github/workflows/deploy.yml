name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        script: |
          cd ec2-deploy-demo || git clone https://github.com/<your-username>/<your-repo>.git ec2-deploy-demo && cd ec2-deploy-demo
          git pull origin main
          npm install
          pm2 restart all || pm2 start index.js
